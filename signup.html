<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Taskly – Sign up / Log in</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --indigo: #4f46e5;
      --violet: #7c3aed;
      --ink:    #0f0f1a;
      --muted:  #6b7280;
      --border: #e5e7eb;
      --paper:  #f7f7fb;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--paper);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 20px;
      padding: 44px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 8px 40px rgba(79,70,229,0.08);
      border: 1px solid var(--border);
    }
    .logo {
      font-family: 'Syne', sans-serif;
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--indigo);
      margin-bottom: 8px;
    }
    .logo span { color: var(--ink); }
    .card-title {
      font-family: 'Syne', sans-serif;
      font-size: 1.4rem;
      font-weight: 800;
      color: var(--ink);
      margin-bottom: 6px;
    }
    .card-sub { font-size: 0.88rem; color: var(--muted); margin-bottom: 32px; }

    .tabs {
      display: flex;
      background: var(--paper);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 28px;
    }
    .tab {
      flex: 1;
      padding: 9px;
      border: none;
      background: none;
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      transition: all .2s;
    }
    .tab.active {
      background: #fff;
      color: var(--indigo);
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .form { display: flex; flex-direction: column; gap: 16px; }
    .form.hidden { display: none; }

    label {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--ink);
      margin-bottom: 6px;
      display: block;
    }
    input {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-family: 'Inter', sans-serif;
      font-size: 0.92rem;
      color: var(--ink);
      background: #fff;
      transition: border-color .2s;
      outline: none;
    }
    input:focus { border-color: var(--indigo); }

    .btn-submit {
      width: 100%;
      padding: 13px;
      background: var(--indigo);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: all .2s;
      margin-top: 4px;
    }
    .btn-submit:hover { background: var(--violet); transform: translateY(-1px); }
    .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--muted);
      font-size: 0.8rem;
      margin: 4px 0;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .btn-google {
      width: 100%;
      padding: 12px;
      background: #fff;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--ink);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: border-color .2s;
    }
    .btn-google:hover { border-color: var(--indigo); }

    .msg {
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 0.85rem;
      font-weight: 500;
      display: none;
    }
    .msg.error { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; display: block; }
    .msg.success { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; display: block; }

    .back-link {
      text-align: center;
      margin-top: 20px;
      font-size: 0.82rem;
      color: var(--muted);
    }
    .back-link a { color: var(--indigo); text-decoration: none; font-weight: 600; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">Task<span>ly</span></div>
  <div class="card-title">Welcome</div>
  <div class="card-sub">Sign up free or log in to your account</div>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab active" onclick="switchTab('signup')">Sign up</button>
    <button class="tab" onclick="switchTab('login')">Log in</button>
  </div>

  <!-- MESSAGE -->
  <div class="msg" id="msg"></div>

  <!-- SIGN UP FORM -->
  <div class="form" id="signup-form">
    <div>
      <label>Full name</label>
      <input type="text" id="signup-name" placeholder="Your name"/>
    </div>
    <div>
      <label>Email</label>
      <input type="email" id="signup-email" placeholder="you@example.com"/>
    </div>
    <div>
      <label>Password</label>
      <input type="password" id="signup-password" placeholder="Min. 6 characters"/>
    </div>
    <button class="btn-submit" id="signup-btn" onclick="handleSignup()">Create account</button>
    <div class="divider">or</div>
    <button class="btn-google" onclick="handleGoogle()">
      <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.964 10.707A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.707V4.961H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.039l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.961L3.964 6.293C4.672 4.166 6.656 3.58 9 3.58z"/></svg>
      Continue with Google
    </button>
  </div>

  <!-- LOGIN FORM -->
  <div class="form hidden" id="login-form">
    <div>
      <label>Email</label>
      <input type="email" id="login-email" placeholder="you@example.com"/>
    </div>
    <div>
      <label>Password</label>
      <input type="password" id="login-password" placeholder="Your password"/>
    </div>
    <button class="btn-submit" id="login-btn" onclick="handleLogin()">Log in</button>
    <div class="divider">or</div>
    <button class="btn-google" onclick="handleGoogle()">
      <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.964 10.707A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.707V4.961H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.039l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.961L3.964 6.293C4.672 4.166 6.656 3.58 9 3.58z"/></svg>
      Continue with Google
    </button>
  </div>

  <div class="back-link"><a href="index.html">← Back to homepage</a></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  // ⚠️ PASTE YOUR SUPABASE DETAILS HERE
  const SUPABASE_URL = 'https://gcaozjvzratzzbusznfz.supabase.co'
  const SUPABASE_KEY = 'sb_publishable_yFTME482ckovqLpJhZjnyA_73HkrZmj'

  const { createClient } = supabase
  const sb = createClient(SUPABASE_URL, SUPABASE_KEY)

  function showMsg(text, type) {
    const el = document.getElementById('msg')
    el.textContent = text
    el.className = 'msg ' + type
  }

  function switchTab(tab) {
    document.getElementById('signup-form').classList.toggle('hidden', tab !== 'signup')
    document.getElementById('login-form').classList.toggle('hidden', tab !== 'login')
    document.querySelectorAll('.tab').forEach((t, i) => {
      t.classList.toggle('active', (i === 0 && tab === 'signup') || (i === 1 && tab === 'login'))
    })
    document.getElementById('msg').className = 'msg'
  }

  async function handleSignup() {
    const name     = document.getElementById('signup-name').value.trim()
    const email    = document.getElementById('signup-email').value.trim()
    const password = document.getElementById('signup-password').value
    if (!name || !email || !password) return showMsg('Please fill in all fields.', 'error')
    if (password.length < 6) return showMsg('Password must be at least 6 characters.', 'error')
    const btn = document.getElementById('signup-btn')
    btn.disabled = true
    btn.textContent = 'Creating account...'
    const { error } = await sb.auth.signUp({ email, password, options: { data: { full_name: name } } })
    btn.disabled = false
    btn.textContent = 'Create account'
    if (error) return showMsg(error.message, 'error')
    showMsg('Account created! Check your email to confirm, then log in.', 'success')
  }

  async function handleLogin() {
    const email    = document.getElementById('login-email').value.trim()
    const password = document.getElementById('login-password').value
    if (!email || !password) return showMsg('Please fill in all fields.', 'error')
    const btn = document.getElementById('login-btn')
    btn.disabled = true
    btn.textContent = 'Logging in...'
    const { error } = await sb.auth.signInWithPassword({ email, password })
    btn.disabled = false
    btn.textContent = 'Log in'
    if (error) return showMsg(error.message, 'error')
    window.location.href = 'profile.html'
  }

  async function handleGoogle() {
  const { error } = await sb.auth.signInWithOAuth({
    provider: 'google',
    options: {
      redirectTo: 'https://tasklylanding.vercel.app/profile.html'
    }
  })
  if (error) showMsg(error.message, 'error')
  }
  
</script>
</body>
</html>
